<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnings Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .result-box {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9ff;
            border-radius: 12px;
            border-left: 5px solid #667eea;
            display: none;
        }
        
        .result-box.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #555;
        }
        
        .result-item.total {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            border-top: 2px solid #e0e0e0;
            padding-top: 12px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Earnings Calculator</h1>
        
        <div class="input-group">
            <label for="hourlyRate">Hourly Rate ($)</label>
            <input type="number" id="hourlyRate" placeholder="Enter hourly rate" min="0" step="0.01">
        </div>
        
        <div class="input-group">
            <label for="hoursWorked">Hours Worked</label>
            <input type="number" id="hoursWorked" placeholder="Enter hours worked" min="0" step="0.5">
        </div>
        
        <div class="input-group">
            <label for="taxRate">Tax Rate (%)</label>
            <input type="number" id="taxRate" placeholder="Enter tax rate (optional)" min="0" max="100" step="0.1" value="0">
        </div>
        
        <button onclick="calculateEarnings()">Calculate Earnings</button>
        
        <div class="result-box" id="resultBox">
            <div class="result-item">
                <span>Gross Earnings:</span>
                <span id="grossEarnings">$0.00</span>
            </div>
            <div class="result-item">
                <span>Tax Amount:</span>
                <span id="taxAmount">$0.00</span>
            </div>
            <div class="result-item total">
                <span>Net Earnings:</span>
                <span id="netEarnings">$0.00</span>
            </div>
        </div>
    </div>
    
    <script>
        function calculateEarnings() {
            const hourlyRate = parseFloat(document.getElementById('hourlyRate').value);
            const hoursWorked = parseFloat(document.getElementById('hoursWorked').value);
            const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
            
            if (!hourlyRate || !hoursWorked) {
                alert('Please fill in all required fields');
                return;
            }
            
            const grossEarnings = hourlyRate * hoursWorked;
            const taxAmount = (grossEarnings * taxRate) / 100;
            const netEarnings = grossEarnings - taxAmount;
            
            document.getElementById('grossEarnings').textContent = '$' + grossEarnings.toFixed(2);
            document.getElementById('taxAmount').textContent = '$' + taxAmount.toFixed(2);
            document.getElementById('netEarnings').textContent = '$' + netEarnings.toFixed(2);
            
            document.getElementById('resultBox').classList.add('show');
        }
        
        document.getElementById('hoursWorked').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculateEarnings();
        });
    </script>
</body>
</html>
